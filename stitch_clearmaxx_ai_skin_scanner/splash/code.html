<!DOCTYPE html>

<html class="light" lang="en"><head>

                  "inverse-surface": "#313030",
                  "on-secondary-fixed": "#2c0051",

                  "outline": "#8b7169",
                  "surface-container-highest": "#e5e2e1",
                  "secondary-fixed": "#efdbff",
                  "inverse-primary": "#ffb59c",
                  "surface-container-low": "#f6f3f2",
                  "on-tertiary-fixed": "#2d141c",

<style>
    body {
      background-color: #fcf9f8;
      overflow: hidden;
      margin: 0;
      padding: 0;
    }
    
    .aura-gradient {
      background: linear-gradient(135deg, #ff7f50 0%, #9c42f4 100%);
    }

    .glass-effect {
      background: rgba(255, 255, 255, 0.4);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .glow-shadow {
      box-shadow: 0px 10px 30px rgba(138, 43, 226, 0.08);
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0px); }
    }

    .animate-float {
      animation: float 4s ease-in-out infinite;
    }

    .reveal-text {
      overflow: hidden;
      white-space: nowrap;
      animation: reveal 1.2s cubic-bezier(0.77, 0, 0.175, 1);
    }

    @keyframes reveal {
      from { width: 0; }
      to { width: 100%; }
    }

    .scale-in {
      animation: scaleIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes scaleIn {
      from { transform: scale(0.8); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="flex flex-col min-h-screen">
<main class="relative flex-1 flex flex-col items-center justify-center overflow-hidden">
<!-- Dynamic Shader Background -->
<div class="absolute inset-0 z-0">

<!-- Atmospheric Gradients Overlay -->
<div class="absolute inset-0 bg-gradient-to-br from-primary-container/20 via-background to-secondary-container/20 mix-blend-soft-light"></div>
</div>
<!-- Content Container -->
<div class="z-10 flex flex-col items-center gap-stack-lg px-container-padding text-center">
<!-- Brand Logo Section -->
<div class="flex flex-col items-center gap-stack-sm scale-in">
<div class="w-24 h-24 rounded-[32px] aura-gradient flex items-center justify-center mb-stack-md glow-shadow animate-float">
<span class="material-symbols-outlined text-white text-[48px]" style="font-variation-settings: 'FILL' 1;">
            camera_enhance
          </span>
</div>
<h1 class="font-display-lg text-display-lg bg-clip-text text-transparent bg-gradient-to-r from-primary to-secondary tracking-tighter">
          ClearMaxx
        </h1>
</div>
<!-- Tagline Section -->
<div class="mt-4">
<p class="font-headline-md text-headline-md text-on-surface-variant font-semibold tracking-tight reveal-text">
          Scan. Track. Glow.
        </p>
</div>
<!-- Bottom Interactive Element (Visual Anchor) -->
<div class="mt-12 flex flex-col items-center gap-stack-md animate-pulse">
<div class="w-1.5 h-12 rounded-full bg-gradient-to-b from-primary/40 to-transparent"></div>
<span class="font-label-sm text-label-sm text-outline tracking-widest uppercase">Initializing AI Analysis</span>
</div>
</div>
<!-- Background Decorative Elements -->
<div class="absolute top-1/4 -left-20 w-64 h-64 bg-primary-container/10 rounded-full blur-[80px]"></div>
<div class="absolute bottom-1/4 -right-20 w-80 h-80 bg-secondary-container/10 rounded-full blur-[100px]"></div>
</main>
<!-- Shell Visibility: Suppressed for Splash Screen per "Relevance Check" logic -->
<!-- No BottomNavBar or TopAppBar here as it is a linear/introductory experience -->
<script>
    // Simple micro-interaction for entry sequence
    document.addEventListener('DOMContentLoaded', () => {
      const mainContent = document.querySelector('.z-10');
      mainContent.classList.add('opacity-0');
      
      setTimeout(() => {
        mainContent.classList.remove('opacity-0');
        mainContent.classList.add('transition-opacity', 'duration-1000', 'opacity-100');
      }, 100);

      // Handle potential shader interaction or vibration on long-press (Haptic Feel)
      let holdTimer;
      document.body.addEventListener('touchstart', (e) => {
        holdTimer = setTimeout(() => {
            if (window.navigator.vibrate) window.navigator.vibrate(20);
        }, 500);
      });
      document.body.addEventListener('touchend', () => clearTimeout(holdTimer));
    });
  </script>
</body></html>
