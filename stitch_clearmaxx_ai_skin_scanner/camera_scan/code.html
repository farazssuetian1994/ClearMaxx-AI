<style>
        @keyframes pulse-ring {
            0% { transform: scale(0.95); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 0.4; }
            100% { transform: scale(0.95); opacity: 0.8; }
        }
        .aura-ring {
            animation: pulse-ring 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .scan-line {
            height: 2px;
            background: linear-gradient(90deg, transparent, #821dda, transparent);
            animation: scan-move 4s ease-in-out infinite;
            position: absolute;
            width: 100%;
            z-index: 10;
        }
        @keyframes scan-move {
            0% { top: 20%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 80%; opacity: 0; }
        }
        .shimmer-text {
            background: linear-gradient(90deg, #1c1b1b 0%, #a43c12 50%, #1c1b1b 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 3s linear infinite;
        }
        @keyframes shimmer {
            to { background-position: 200% center; }
        }
        .radial-guide {
            mask-image: radial-gradient(circle at 50% 45%, transparent 160px, black 161px);
            -webkit-mask-image: radial-gradient(circle at 50% 45%, transparent 160px, black 161px);
        }
    </style>

<script>
        // Micro-interaction for the capture button
        const captureBtn = document.querySelector('button.group');
        captureBtn.addEventListener('click', () => {
            // Flash effect
            const flash = document.createElement('div');
            flash.className = 'fixed inset-0 bg-white z-[100] transition-opacity duration-300 pointer-events-none';
            document.body.appendChild(flash);
            setTimeout(() => flash.style.opacity = '0', 50);
            setTimeout(() => flash.remove(), 400);
            
            // Haptic simulation
            if (window.navigator.vibrate) {
                window.navigator.vibrate(50);
            }
        });

        // Interactive "Face Frame" tracking simulation
        document.addEventListener('mousemove', (e) => {
            const scanLine = document.querySelector('.scan-line');
            if (scanLine) {
                // Subtle reactive movement can be added here if desired
            }
        });
    </script>
