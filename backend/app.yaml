# ClearMaxx AI backend — deployed as its OWN App Engine service ("clearmaxx")
# so it does not overwrite the existing "default" service (chartsense) in the
# same project. URL: https://clearmaxx-dot-ai-backend-project-482118.uc.r.appspot.com
#
# NOTE: there is intentionally NO API key here. The Gemini key and app token are
# read at runtime from Google Secret Manager (secrets: clearmaxx-gemini-key,
# clearmaxx-app-token). GOOGLE_CLOUD_PROJECT is injected by App Engine.
service: clearmaxx
runtime: python311
entrypoint: gunicorn -b :$PORT --workers 1 --threads 8 --timeout 120 main:app

instance_class: F2

automatic_scaling:
  max_instances: 5
  min_idle_instances: 0
